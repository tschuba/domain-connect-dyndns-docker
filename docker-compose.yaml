services:
  domain-connect-dyndns:
    image: tschuba/domain-connect-dyndns
    build:
      context: .
      dockerfile: ./src/main/Docker/Dockerfile
    container_name: domain-connect-dyndns
    restart: unless-stopped
    volumes:
      - ./config/domain-connect-dyndns.json:/app/config/domain-connect-dyndns.json
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f cron && test -f /etc/cron.d/dyndns-cron"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s